# Konta PWA - Configuración de Nginx

server {
  listen 80;
  listen [::]:80;
  
  # Redirige HTTP a HTTPS (descomenta cuando tengas SSL)
  # return 301 https://$server_name$request_uri;

  server_name tu-dominio.com www.tu-dominio.com;
  
  root /var/www/konta;
  index index.html;

  # Security Headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Desactiva el caché para index.html
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Cache control para manifest.json
  location = /manifest.json {
    add_header Cache-Control "public, max-age=86400";
    add_header Content-Type "application/json; charset=utf-8";
  }

  # Cache control para Service Worker (1 hora)
  location = /sw.js {
    add_header Cache-Control "public, max-age=3600";
    add_header Content-Type "application/javascript; charset=utf-8";
  }

  # Cache control para recursos estáticos (30 días)
  location ~ \.(js|css|svg|png|jpg|jpeg|gif|ico|webp|woff|woff2|ttf)$ {
    add_header Cache-Control "public, max-age=2592000";
    expires 30d;
  }

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/javascript text/xml text/x-component text/x-cross-domain-policy application/javascript application/json application/xml application/rss+xml font/truetype;

  # SPA rewrites - redirige 404 a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Deniega acceso a archivos ocultos
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Logging
  access_log /var/log/nginx/konta_access.log;
  error_log /var/log/nginx/konta_error.log;

  # SSL Configuration (descomenta cuando tengas certificado)
  # listen 443 ssl http2;
  # listen [::]:443 ssl http2;
  # ssl_certificate /etc/ssl/certs/tu-certificado.crt;
  # ssl_certificate_key /etc/ssl/private/tu-clave.key;
  # ssl_protocols TLSv1.2 TLSv1.3;
  # ssl_ciphers HIGH:!aNULL:!MD5;
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
